<!-- Tabela -->
<div class="flex flex-col items-center justify-center h-full gap-4 w-full">
  <!-- Header -->
  <div class="flex items-center gap-4 w-full px-4">
    <h2 class="text-2xl font-bold">{{ tableName }}</h2>
    <app-data-picker></app-data-picker>
    <button 
      nz-button 
      nzType="default"
      (click)="rerender()"
      class="ml-auto"
    >
      <i nz-icon nzType="reload" nzTheme="outline"></i>
      Refresh
    </button>
  </div>

  <!-- Table -->
  <div class="w-full overflow-x-auto px-4">
    <nz-table 
      #table 
      [nzData]="displayData"
      [nzLoading]="isLoading"
      nzSize="small"
      [nzScroll]="{ x: '100%' }"
      class="w-full"
    >
      <!-- Nome Column -->
      <thead>
        <tr>
          <th nzWidth="25%">Nome</th>
          <th nzWidth="35%">Email</th>
          <th nzWidth="20%">Aniversário</th>
          <th nzWidth="20%">Ações</th>
        </tr>
      </thead>
      <tbody>
        @for (member of displayData; track member.email) {
          <tr>
            <td>{{ member.nome }}</td>
            <td>
              <span class="italic text-blue-600">{{ member.email }}</span>
            </td>
            <td>{{ member.aniversario | date: 'dd/MM/yyyy' }}</td>
            <td>
              <button nz-button nzType="primary" nzSize="small" class="mr-2">
                Editar
              </button>
              <button nz-button nzDanger nzSize="small">
                Remover
              </button>
            </td>
          </tr>
        }
      </tbody>
    </nz-table>
  </div>
</div>
