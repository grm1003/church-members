<section class="mx-auto w-full max-w-3xl rounded-xl border border-slate-200 bg-white p-6 shadow-sm md:p-8">
  <h2 class="text-2xl font-semibold text-slate-900">Cadastro de Membros</h2>
  <p class="mt-2 text-sm text-slate-700">Todos os campos sao obrigatorios.</p>

  <form
    nz-form
    nzLayout="vertical"
    [nzAutoTips]="autoTips"
    [formGroup]="validateForm"
    (ngSubmit)="submitForm()"
    class="mt-6 space-y-1"
  >
    <nz-form-item>
      <nz-form-label nzRequired>Nome completo</nz-form-label>
      <nz-form-control nzErrorTip="Informe o nome completo com no minimo 3 caracteres.">
        <input nz-input formControlName="nome" placeholder="Ex.: Maria Silva" />
      </nz-form-control>
    </nz-form-item>

    <nz-form-item>
      <nz-form-label nzRequired>E-mail</nz-form-label>
      <nz-form-control nzErrorTip="Informe um e-mail valido.">
        <input nz-input formControlName="email" type="email" placeholder="Ex.: maria@email.com" />
      </nz-form-control>
    </nz-form-item>

    <nz-form-item>
      <nz-form-label nzRequired>Data de nascimento</nz-form-label>
      <nz-form-control nzErrorTip="Selecione a data de nascimento.">
        <nz-date-picker
          formControlName="aniversario"
          nzFormat="dd/MM/yyyy"
          nzPlaceHolder="Selecione a data"
          [nzDisabledDate]="disableFutureDates"
          class="w-full"
        />
      </nz-form-control>
    </nz-form-item>

    <nz-form-item class="!mb-0 pt-2">
      <nz-form-control>
        <button nz-button nzType="primary" type="submit" class="h-10 min-w-44 rounded-md px-6">
          Cadastrar membro
        </button>
      </nz-form-control>
    </nz-form-item>
  </form>
</section>
